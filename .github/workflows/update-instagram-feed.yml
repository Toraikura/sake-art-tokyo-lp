name: Update Instagram feed

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC. 17:00 UTC is 02:00 JST the following day.
    - cron: "0 17 * * *"

permissions:
  contents: write
  pages: write

concurrency:
  group: instagram-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      INSTAGRAM_API_VERSION: v25.0
      INSTAGRAM_GRAPH_HOST: graph.facebook.com
      INSTAGRAM_ITEM_LIMIT: 3
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest posts
        run: node scripts/update-instagram-feed.mjs

      - name: Commit updated feed
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/instagram-feed.json assets/images/instagram
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update Instagram feed"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Request Pages rebuild
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"
